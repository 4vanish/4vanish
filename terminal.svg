    <text x="16" font-size="13" fill="#79c0ff">./recon</text>
    <text x="78" font-size="13" fill="#c9d1d9">--target</text>
    <text x="146" font-size="13" fill="#a5d6ff">avanish</text>
    <text x="202" font-size="13" fill="#8b949e">--verbose</text>
  </g>

  <text x="24" y="86" font-size="11" fill="#6e7681">[+] enumerating profile…</text>

  <!-- Recon rows -->
  <g transform="translate(24, 110)">
    <text font-size="13" fill="#3fb950">[✓]</text>
    <text x="38" font-size="13" fill="#8b949e">name</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">Avanish Pathak</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.10s" fill="freeze"/>
