<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace">
  <!-- Window chrome -->
  <rect width="860" height="460" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect width="860" height="36" rx="10" fill="#161b22"/>
  <rect y="20" width="860" height="16" fill="#161b22"/>

  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>

  <text x="430" y="22" font-size="13" fill="#8b949e" text-anchor="middle">avanish@4vanish: ~/profile</text>

  <g>
