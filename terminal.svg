    <text x="480" y="74" font-size="12" fill="#8b949e">vulnerabilities</text>
    <text x="620" y="74" font-size="14" fill="#ffa657" font-weight="700">1000+ reported</text>

    <text x="480" y="92" font-size="12" fill="#8b949e">hall of fame</text>
    <text x="620" y="92" font-size="14" fill="#d2a8ff" font-weight="700">70+ programs</text>
