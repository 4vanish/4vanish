<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace">
  <!-- Window chrome -->
  <rect width="860" height="440" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect width="860" height="36" rx="10" fill="#161b22"/>
  <rect y="20" width="860" height="16" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>

  <!-- Tab title -->
  <text x="430" y="22" font-size="13" fill="#8b949e" text-anchor="middle">~/recon — zsh — 110×30</text>

  <!-- ONLINE pulse -->
  <g>
    <circle cx="794" cy="18" r="4" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="806" y="22" font-size="11" fill="#3fb950" font-weight="600">ACTIVE</text>
  </g>

  <!-- Command -->
  <g transform="translate(24, 66)">
