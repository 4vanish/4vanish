    <text x="38" font-size="13" fill="#8b949e">location</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">Abu Dhabi, UAE 🇦🇪</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.30s" fill="freeze"/>
  </g>

  <g transform="translate(24, 176)">
    <text font-size="13" fill="#3fb950">[✓]</text>
    <text x="38" font-size="13" fill="#8b949e">domains</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">Web · Mobile · API · OT · Cloud (AWS) · AI/LLM</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.40s" fill="freeze"/>
  </g>

  <g transform="translate(24, 198)">
    <text font-size="13" fill="#3fb950">[✓]</text>
    <text x="38" font-size="13" fill="#8b949e">engagements</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">300+ security assessments delivered</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.50s" fill="freeze"/>
