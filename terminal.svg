    <text x="38" font-size="13" fill="#8b949e">platforms</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">Bugcrowd (Top 250 · MVP '19 &amp; '20) · Synack (Top 300)</text>
