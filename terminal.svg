      <text x="274" y="72">Desktop</text>
      <text x="430" y="72">External Network</text>
      <text x="560" y="72">Internal Network</text>
      <text x="690" y="72">PCI Segmentation</text>

      <text x="14"  y="92">iOS pentesting</text>
      <text x="144" y="92">IoT</text>
      <text x="274" y="92">Linux</text>
      <text x="430" y="92">Network Security</text>
      <text x="560" y="92">Offensive Security</text>
      <text x="690" y="92">Red Teaming</text>

      <text x="14"  y="112">Secure Code Review</text>
      <text x="144" y="112">Security Hardening</text>
      <text x="274" y="112">Thick Client</text>
      <text x="430" y="112">Threat Modeling</text>
      <text x="560" y="112">Vulnerability Assess.</text>
      <text x="690" y="112">Vuln. Research</text>

      <text x="14"  y="132">Web Application Sec</text>
      <text x="144" y="132">Windows</text>
    </g>
