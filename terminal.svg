  <!-- Footer -->
  <g transform="translate(24, 448)">
    <text font-size="13" fill="#3fb950">$</text>
    <text x="16" font-size="13" fill="#d2a8ff" font-style="italic">"Constantly learning, always hacking."</text>
    <text x="316" font-size="13" fill="#58a6ff">▌
