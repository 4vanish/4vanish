    <text x="38" font-size="13" fill="#8b949e">talks</text>
    <text x="156" font-size="13" fill="#6e7681">::</text>
    <text x="178" font-size="13" fill="#c9d1d9">DeepSec Vienna 2025 · BSides Mussoorie 2026</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.90s" fill="freeze"/>
