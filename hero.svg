<svg width="1000" height="240" viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg" font-family="'SFMono-Regular', 'Fira Code', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <linearGradient id="nameglow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#58a6ff"/>
      <stop offset="60%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#a5d6ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="2" height="3" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#ffffff" opacity="0.025"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="240" fill="url(#bg)"/>
  <rect width="1000" height="240" fill="url(#grid)"/>
  <rect width="1000" height="240" fill="url(#scan)"/>

  <!-- Top-left chrome bracket -->
  <path d="M 16 16 L 16 40 M 16 16 L 40 16" stroke="#3fb950" stroke-width="2" fill="none"/>
  <text x="50" y="32" font-size="11" fill="#3fb950">PROFILE.SYS</text>
  <circle cx="160" cy="28" r="3" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Top-right chrome bracket -->
  <path d="M 984 16 L 984 40 M 984 16 L 960 16" stroke="#3fb950" stroke-width="2" fill="none"/>
  <text x="956" y="32" font-size="11" fill="#3fb950" text-anchor="end">[ACCESS GRANTED]</text>

  <!-- Prompt line -->
  <g transform="translate(64, 72)">
    <text font-size="13" fill="#ffa657">root@4vanish</text>
    <text x="100" font-size="13" fill="#6e7681">:</text>
    <text x="108" font-size="13" fill="#79c0ff">~</text>
    <text x="120" font-size="13" fill="#6e7681">$</text>
    <text x="132" font-size="13" fill="#c9d1d9">whoami</text>
  </g>

  <!-- Big name with cyan glow -->
  <g transform="translate(64, 130)">
    <text font-size="54" font-weight="700" fill="url(#nameglow)" filter="url(#glow)" letter-spacing="2">AVANISH PATHAK</text>
    <text x="498" y="-2" font-size="54" font-weight="700" fill="#58a6ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.05s" repeatCount="indefinite"/>
      _
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(64, 168)">
    <text font-size="14" fill="#8b949e">//</text>
    <text x="26" font-size="14" fill="#c9d1d9" letter-spacing="0.5">Security Researcher</text>
    <text x="200" font-size="14" fill="#6e7681">·</text>
    <text x="212" font-size="14" fill="#c9d1d9">Red Team</text>
    <text x="290" font-size="14" fill="#6e7681">·</text>
    <text x="302" font-size="14" fill="#c9d1d9">Penetration Tester</text>
  </g>

  <!-- Footer line: location + stats badges (with breathing room) -->
  <g transform="translate(64, 200)">
    <text font-size="12" fill="#7ee787">▸</text>
    <text x="16" font-size="12" fill="#8b949e">based</text>
    <text x="58" font-size="12" fill="#c9d1d9">Abu Dhabi, UAE 🇦🇪</text>

    <text x="232" font-size="12" fill="#6e7681">|</text>

    <text x="252" font-size="12" fill="#79c0ff" font-weight="700">300+</text>
    <text x="290" font-size="12" fill="#c9d1d9">Security Assessments</text>

    <text x="378" font-size="12" fill="#6e7681">·</text>

    <text x="394" font-size="12" fill="#ffa657" font-weight="700">1500+</text>
    <text x="436" font-size="12" fill="#c9d1d9">Vulnerabilities reported</text>

    <text x="606" font-size="12" fill="#6e7681">·</text>

    <text x="622" font-size="12" fill="#d2a8ff" font-weight="700">70+</text>
    <text x="652" font-size="12" fill="#c9d1d9">Hall of Fame</text>
  </g>

  <!-- Bottom bracket corners -->
  <path d="M 16 224 L 16 200 M 16 224 L 40 224" stroke="#3fb950" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 984 224 L 984 200 M 984 224 L 960 224" stroke="#3fb950" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
